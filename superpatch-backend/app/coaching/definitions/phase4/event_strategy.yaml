id: event_strategy
name: Events & Team Call Strategy
program: 100m_blueprint
phase: 4
week: 11
frameworks:
  - Promote-Present-Plug In
  - Event Rhythm
worksheet_path: docs/worksheets/week-11b-event-strategy.md
prerequisites: []
questions:
  - id: q1
    text: "What events or calls are you currently running or plugging into? (Team Zoom, opportunity calls, home meetings, regional events, company events)"
    type: open_ended
  - id: q2
    text: "How often do you run or attend a team call?"
    type: choice
    options:
      - value: never
        label: "Never"
      - value: monthly
        label: "Monthly"
      - value: biweekly
        label: "Every 2 weeks"
      - value: weekly
        label: "Weekly"
  - id: q3
    text: "When you invite a prospect to an event or call, what do you say? Write your invitation script."
    type: open_ended
  - id: q4
    text: "Do you use the Promote-Present-Plug In framework? (Promote the event → Present at the event → Plug new people into the next event)"
    type: open_ended
  - id: q5
    text: "What type of event produces the BEST results for you?"
    type: choice
    options:
      - value: zoom
        label: "Zoom calls"
      - value: one_on_one
        label: "One-on-one meetings"
      - value: home_meeting
        label: "Home meetings / house parties"
      - value: local_event
        label: "Local meetups or pop-ups"
      - value: company_event
        label: "Company or regional events"
  - id: q6
    text: "How many guests (non-team-members) attended your last event or call?"
    type: choice
    options:
      - value: "0"
        label: "0 — no guests"
      - value: "1_3"
        label: "1-3 guests"
      - value: "4_10"
        label: "4-10 guests"
      - value: "10_plus"
        label: "10+ guests"
  - id: q7
    text: "Do you recognize and celebrate your team at events? How?"
    type: open_ended
  - id: q8
    text: "Rate how effectively your events convert guests into customers or reps."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q9
    text: "Write your event calendar for the next 30 days — what events are happening and when."
    type: open_ended
  - id: q10
    text: "How many guests will you personally bring to your next event?"
    type: choice
    options:
      - value: "1_2"
        label: "1-2"
      - value: "3_5"
        label: "3-5"
      - value: "5_plus"
        label: "5+"
scoring:
  type: scale
  dimensions:
    - event_consistency
    - guest_attendance
    - conversion_effectiveness
  levels:
    - name: Quiet
      range_label: "1-3"
    - name: Active
      range_label: "4-6"
    - name: Electric
      range_label: "7-10"
actions:
  - Schedule at least 1 team call or event per week for the next 30 days
  - Invite 3 guests to your next event
  - Create a simple event promotion post or message you can send
  - Recognize at least 1 team member at every event
