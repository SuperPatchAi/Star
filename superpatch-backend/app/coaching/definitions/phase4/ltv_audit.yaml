id: ltv_audit
name: LTV Optimization Audit
program: 100m_blueprint
phase: 4
week: 10
frameworks:
- Re-Engagement
worksheet_path: ../docs/worksheets/week-10-ltv-audit.md
prerequisites: []
questions:
- id: q1
  text: The LTV Formula (Subscription/Recurring)
  type: open_ended
- id: q2
  text: 'Example:'
  type: open_ended
- id: q3
  text: 'Step 1: Average Revenue Per User (ARPU)'
  type: table
  max_items: 3
- id: q4
  text: 'Step 2: Churn Rate'
  type: table
  max_items: 3
- id: q5
  text: 'Step 3: LTV Calculation'
  type: table
  max_items: 1
- id: q6
  text: Customer Acquisition Cost
  type: table
  max_items: 5
- id: q7
  text: The Health Check
  type: table
  max_items: 1
- id: q8
  text: 'Benchmarks:'
  type: table
  max_items: 4
- id: q9
  text: 'Your Status: ☐ Critical ☐ Warning ☐ Healthy ☐ Excellent'
  type: open_ended
- id: q10
  text: 'Assess each lever:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q11
  text: 'Your #1 Opportunity: _______________________'
  type: fill_in
- id: q12
  text: 'Lever 1: Onboarding'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_have_a_structured_onboarding_sequence
    label: Do you have a structured onboarding sequence?
  - value: time_to_first_value_how_quickly_do_customers_see_results
    label: Time to first value (how quickly do customers see results)?
  - value: do_you_send_a_quick_start_guide_within_24_hours
    label: Do you send a "Quick Start" guide within 24 hours?
  - value: 30-day_retention_rate
    label: 30-day retention rate
- id: q13
  text: 'Lever 2: Upselling'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_have_a_premium_tier
    label: Do you have a premium tier?
  - value: do_you_offer_upsells_at_checkout
    label: Do you offer upsells at checkout?
  - value: '%_of_customers_who_upgrade'
    label: '% of customers who upgrade'
  - value: average_upsell_value
    label: Average upsell value
- id: q14
  text: 'Lever 3: Cross-Selling'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_have_complementary_productsservices
    label: Do you have complementary products/services?
  - value: do_you_recommend_related_products
    label: Do you recommend related products?
  - value: average_order_value_increase_from_cross-sell
    label: Average order value increase from cross-sell
- id: q15
  text: 'Lever 4: Loyalty Programs'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_have_a_loyaltyrewards_program
    label: Do you have a loyalty/rewards program?
  - value: do_customers_earn_points_or_status
    label: Do customers earn points or status?
  - value: repeat_purchase_rate
    label: Repeat purchase rate
- id: q16
  text: 'Lever 5: Proactive Support'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_check_in_with_customers_at_day_30
    label: Do you check in with customers at Day 30?
  - value: do_you_identify_at-risk_customers_before_they_churn
    label: Do you identify at-risk customers before they churn?
  - value: average_support_response_time
    label: Average support response time
- id: q17
  text: 'Lever 6: Re-Engagement'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: do_you_have_an_automated_re-engagement_sequence
    label: Do you have an automated re-engagement sequence?
  - value: winback_rate_%_of_churned_customers_who_return
    label: Winback rate (% of churned customers who return)
  - value: do_you_offer_incentives_to_return
    label: Do you offer incentives to return?
- id: q18
  text: 'Design your 4-email winback sequence:'
  type: table
  max_items: 4
- id: q19
  text: 'Email 1 Template (Day 45):'
  type: fill_in
- id: q20
  text: '90-Day Action Plan:'
  type: table
  max_items: 6
- id: q21
  text: 'Projected LTV Improvement:'
  type: table
  max_items: 4
- id: q22
  text: 'Track weekly:'
  type: table
  max_items: 7
- id: q23
  text: 'Part 10: Commitment'
  type: fill_in
actions: []
scoring:
  type: scale
  dimensions:
  - upsell value
  - order value increase from cross-sell
  - support response time
  levels:
  - name: Low
    range_label: 1-3
  - name: Medium
    range_label: 4-6
  - name: High
    range_label: 7-10
