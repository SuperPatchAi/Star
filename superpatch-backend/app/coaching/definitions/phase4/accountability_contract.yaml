id: accountability_contract
name: Accountability Contract
program: 100m_blueprint
phase: 4
week: 12
frameworks:
  - Non-Negotiable Daily Activities
  - Accountability Partnership
worksheet_path: docs/worksheets/week-12c-accountability-contract.md
prerequisites: []
questions:
  - id: q1
    text: "How many new conversations/reaches will you commit to per day?"
    type: choice
    options:
      - value: "3"
        label: "3 per day"
      - value: "5"
        label: "5 per day"
      - value: "10"
        label: "10 per day"
      - value: "10_plus"
        label: "10+ per day"
  - id: q2
    text: "How many samples will you commit to sending per week?"
    type: choice
    options:
      - value: "3"
        label: "3 per week"
      - value: "5"
        label: "5 per week"
      - value: "10"
        label: "10 per week"
      - value: "10_plus"
        label: "10+ per week"
  - id: q3
    text: "How many follow-ups will you do per day?"
    type: choice
    options:
      - value: "2"
        label: "2 per day"
      - value: "5"
        label: "5 per day"
      - value: "10"
        label: "10 per day"
  - id: q4
    text: "How many presentations (1-on-1, Zoom, 3-way calls) will you do per week?"
    type: choice
    options:
      - value: "2"
        label: "2 per week"
      - value: "5"
        label: "5 per week"
      - value: "7"
        label: "7+ per week"
  - id: q5
    text: "Will you complete your Daily Success Ritual every day? (Morning routine, power hour, evening review)"
    type: choice
    options:
      - value: "no"
        label: "I'll try"
      - value: "weekdays"
        label: "Weekdays only"
      - value: "yes"
        label: "Every single day — no exceptions"
  - id: q6
    text: "Will you attend your team's weekly training call?"
    type: choice
    options:
      - value: "sometimes"
        label: "When I can"
      - value: "yes"
        label: "Yes — every week"
  - id: q7
    text: "Who is your accountability partner? (Upline, teammate, or coach)"
    type: fill_in
  - id: q8
    text: "How will you report your daily numbers to your accountability partner? (Text, voice memo, shared tracker)"
    type: open_ended
  - id: q9
    text: "What happens if you DON'T hit your daily commitments? What is the consequence you agree to?"
    type: open_ended
  - id: q10
    text: "Write your commitment declaration: 'For the next 90 days, I commit to...' — be specific."
    type: open_ended
scoring:
  type: ratio
  dimensions:
    - daily_reaches
    - weekly_samples
    - weekly_presentations
  target_ratio: "50/30/20"
actions:
  - Sign your accountability contract and share it with your partner
  - Start tracking your daily numbers immediately
  - Check in with your accountability partner every day for 30 days
  - Review and adjust your targets monthly
