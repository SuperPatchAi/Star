id: duplication_system
name: The Duplication System
program: 100m_blueprint
phase: 4
week: 10
frameworks:
  - Simplicity Principle
  - Plug-In System
worksheet_path: docs/worksheets/week-10b-duplication-system.md
prerequisites:
  - team_building_blueprint
questions:
  - id: q1
    text: "Could someone brand new on your team explain what to do in their first week WITHOUT calling you? Do you have a system they can follow?"
    type: choice
    options:
      - value: "no"
        label: "No — they need me for everything"
      - value: "some"
        label: "Partially — some things are written down"
      - value: "yes"
        label: "Yes — there's a clear step-by-step system"
  - id: q2
    text: "What tools and resources do you give new team members? (Scripts, videos, training links, group chats, etc.)"
    type: open_ended
  - id: q3
    text: "Is your approach simple enough that a brand new rep could teach it to THEIR new rep? Be honest."
    type: open_ended
  - id: q4
    text: "How do you use 3-way calls or Zoom intros to help your team close? Describe your process."
    type: open_ended
  - id: q5
    text: "Do you have a regular team training rhythm? (Weekly call, monthly workshop, etc.)"
    type: choice
    options:
      - value: "none"
        label: "No regular training"
      - value: "monthly"
        label: "Monthly"
      - value: "weekly"
        label: "Weekly"
      - value: "multiple"
        label: "Multiple times per week"
  - id: q6
    text: "What is the SIMPLEST version of your system? If you had to explain the entire business process in 3 steps, what would they be?"
    type: open_ended
  - id: q7
    text: "What part of your system is NOT duplicating? Where do new reps get stuck or confused?"
    type: open_ended
  - id: q8
    text: "Rate how duplicatable your current system is."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q9
    text: "What ONE thing would you simplify or remove to make your system easier to teach?"
    type: open_ended
  - id: q10
    text: "Can your team succeed without you being involved in every conversation? What would need to change?"
    type: open_ended
scoring:
  type: scale
  dimensions:
    - simplicity
    - reproducibility
    - team_independence
  levels:
    - name: Complicated
      range_label: "1-3"
    - name: Teachable
      range_label: "4-6"
    - name: Automatic
      range_label: "7-10"
case_study:
  title: "Simple Scales, Complicated Fails"
  content: >
    Jay's rule: "If your new rep can't explain the system to their friend
    over coffee in 5 minutes, it's too complicated. Duplication is not
    about being brilliant. It's about being simple. The Push Test, a
    sample, a follow-up, a close. That's it. If you're adding steps,
    you're subtracting duplication."
actions:
  - Write your 3-step system and test it on a brand new rep
  - Create or curate a "New Rep Toolkit" (scripts, videos, links)
  - Schedule a weekly team training call
  - Remove one unnecessary step from your current process
