id: ceo_log_template
name: CEO's Decision Log
program: 100m_blueprint
phase: 4
week: 12
frameworks:
  - CEO Mindset
  - Decision Journal
worksheet_path: docs/worksheets/week-12b-ceo-log.md
prerequisites: []
questions:
  - id: q1
    text: "What is the biggest decision you made in your SuperPatch business this week?"
    type: open_ended
  - id: q2
    text: "What was the context? What information did you have when you made the decision?"
    type: open_ended
  - id: q3
    text: "What was the outcome? Did it work? Why or why not?"
    type: open_ended
  - id: q4
    text: "What would you do differently next time?"
    type: open_ended
  - id: q5
    text: "How much time this week did you spend on income-producing activities vs. admin and busywork?"
    type: choice
    options:
      - value: mostly_busywork
        label: "Mostly admin and busywork"
      - value: about_half
        label: "About 50/50"
      - value: mostly_ipa
        label: "Mostly income-producing"
      - value: almost_all_ipa
        label: "Almost all income-producing"
  - id: q6
    text: "What is the ONE lesson from this week you want to remember?"
    type: open_ended
  - id: q7
    text: "What are your top 3 priorities for NEXT week?"
    type: table
    max_items: 3
  - id: q8
    text: "Are you treating your SuperPatch business like a BUSINESS or a HOBBY? What's the evidence?"
    type: open_ended
  - id: q9
    text: "Rate your overall business performance this week."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q10
    text: "What would Jay say about your week if he saw your numbers? Be brutally honest."
    type: open_ended
scoring:
  type: ratio
  dimensions:
    - income_producing
    - team_support
    - personal_development
  target_ratio: "80/15/5"
actions:
  - Complete a CEO's Log entry every Friday
  - Review your previous 4 entries monthly to spot patterns
  - Share one key insight from your log with your team
  - Adjust next week's schedule based on what you learned
