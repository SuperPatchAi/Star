id: team_building_blueprint
name: Team Building Blueprint
program: 100m_blueprint
phase: 4
week: 10
frameworks:
  - Depth vs. Width
  - 3-Deep Rule
worksheet_path: docs/worksheets/week-10a-team-building-blueprint.md
prerequisites:
  - recruiting_conversation
  - first_48_hours
questions:
  - id: q1
    text: "How many personally enrolled reps do you currently have?"
    type: choice
    options:
      - value: "0"
        label: "0"
      - value: "1_3"
        label: "1-3"
      - value: "4_10"
        label: "4-10"
      - value: "10_25"
        label: "10-25"
      - value: "25_plus"
        label: "25+"
  - id: q2
    text: "Of those reps, how many are actively building (prospecting, sampling, recruiting weekly)?"
    type: open_ended
  - id: q3
    text: "Do you know the difference between building WIDE (enrolling more people yourself) vs. building DEEP (helping your team's team succeed)? Which are you doing more of?"
    type: open_ended
  - id: q4
    text: "Who are your TOP 3 builders — the people on your team with the most potential? What are you doing to support them?"
    type: table
    max_items: 3
  - id: q5
    text: "Are you 'taprooting' — working with your team's new enrollees to help them get started? Describe your taprooting activity."
    type: open_ended
  - id: q6
    text: "How many levels deep is your organization right now? (You → your rep → their rep → etc.)"
    type: choice
    options:
      - value: "1"
        label: "1 level (just my personal enrollments)"
      - value: "2"
        label: "2 levels deep"
      - value: "3"
        label: "3 levels deep"
      - value: "4_plus"
        label: "4+ levels deep"
  - id: q7
    text: "What is your biggest challenge with team building right now?"
    type: choice
    options:
      - value: no_one_building
        label: "Nobody on my team is actively building"
      - value: retention
        label: "People join but quit within 90 days"
      - value: dependence
        label: "My team only works when I push them"
      - value: no_leaders
        label: "I can't find leaders — everyone wants to be a customer only"
      - value: time
        label: "I don't have time to support my team AND recruit"
  - id: q8
    text: "What would your team look like in 90 days if you focused on building 3 levels deep with 3 serious builders?"
    type: open_ended
  - id: q9
    text: "Rate your team building skills right now."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q10
    text: "Name the 3 people you will 'go deep' with this month. What will you do with each of them?"
    type: table
    max_items: 3
scoring:
  type: scale
  dimensions:
    - team_depth
    - builder_identification
    - support_consistency
  levels:
    - name: Solo
      range_label: "1-3"
    - name: Building
      range_label: "4-6"
    - name: Leader
      range_label: "7-10"
actions:
  - Identify your top 3 builders and schedule weekly check-ins
  - Taproot 3 levels deep in at least one leg this month
  - Help each of your top 3 builders enroll at least 1 person this month
  - Track team depth weekly (how many active levels in each leg)
