id: objection_mastery
name: Objection Mastery
program: 100m_blueprint
phase: 2
week: 5
frameworks:
  - Feel-Felt-Found
  - Objection Reframes
worksheet_path: docs/worksheets/week-05b-objection-mastery.md
prerequisites: []
questions:
  - id: q1
    text: "What is the #1 objection you hear most often?"
    type: choice
    options:
      - value: too_expensive
        label: "It's too expensive"
      - value: pyramid_scheme
        label: "Is this a pyramid scheme / MLM?"
      - value: no_time
        label: "I don't have time"
      - value: doesnt_work
        label: "Patches don't work / I'm skeptical"
      - value: tried_mlm
        label: "I tried network marketing before and it didn't work"
      - value: not_a_salesperson
        label: "I'm not a salesperson"
      - value: spouse
        label: "I need to talk to my spouse"
      - value: think_about_it
        label: "Let me think about it"
  - id: q2
    text: "When someone says 'It's too expensive,' what do you currently say?"
    type: open_ended
  - id: q3
    text: "When someone says 'Is this a pyramid scheme?', what do you currently say?"
    type: open_ended
  - id: q4
    text: "When someone says 'I don't have time,' what do you currently say?"
    type: open_ended
  - id: q5
    text: "When someone says 'Let me think about it,' what do you currently say?"
    type: open_ended
  - id: q6
    text: "Rate your confidence handling objections on the spot."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q7
    text: "Using the Feel-Felt-Found framework, write a response for your #1 most common objection."
    type: open_ended
  - id: q8
    text: "What objection do YOU secretly agree with? (This is the one holding you back.)"
    type: open_ended
  - id: q9
    text: "For the objection you secretly agree with — what evidence proves it WRONG?"
    type: open_ended
  - id: q10
    text: "What percentage of your objections are about the PRODUCT vs. the BUSINESS OPPORTUNITY?"
    type: choice
    options:
      - value: mostly_product
        label: "80%+ product objections"
      - value: mixed
        label: "About 50/50"
      - value: mostly_business
        label: "80%+ business opportunity objections"
scoring:
  type: scale
  dimensions:
    - confidence
    - preparation
    - reframe_quality
  levels:
    - name: Defensive
      range_label: "1-3"
    - name: Competent
      range_label: "4-6"
    - name: Unstoppable
      range_label: "7-10"
actions:
  - Write out Feel-Felt-Found responses for your top 5 objections
  - Practice each response out loud until it feels natural
  - Role-play objection handling with your upline or team partner
  - Identify and resolve the objection YOU secretly believe
