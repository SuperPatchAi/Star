id: ab_decision_audit
name: A/B Decision Audit
program: 100m_blueprint
phase: 2
week: 4
frameworks:
- A/B Decision Audit
worksheet_path: ../docs/worksheets/week-04b-ab-decision-audit.md
prerequisites: []
questions:
- id: q1
  text: 'List your top 5 pending decisions:'
  type: checkbox
  options:
  - value: '1'
    label: '1'
  - value: '2'
    label: '2'
  - value: '3'
    label: '3'
  - value: '4'
    label: '4'
  - value: '5'
    label: '5'
- id: q2
  text: 'For each B Decision, apply the "70% Rule":'
  type: checkbox
  options:
  - value: question
    label: Question
  - value: whats_the_worst_case_if_im_wrong
    label: What's the worst case if I'm wrong?
  - value: can_i_undo_it_how_long_would_it_take
    label: Can I undo it? How long would it take?
  - value: do_i_have_70%_confidence
    label: Do I have 70% confidence?
  - value: action
    label: 'Action:'
- id: q3
  text: 'For A Decisions, use this framework:'
  type: fill_in
- id: q4
  text: 'Step 1: Define the Decision'
  type: table
  max_items: 3
- id: q5
  text: 'Step 2: Gather Information'
  type: checkbox
  options:
  - value: information_needed
    label: Information Needed
- id: q6
  text: 'Step 3: Consult Widely'
  type: checkbox
  options:
  - value: person_to_consult
    label: Person to Consult
- id: q7
  text: 'Step 4: Analyze Scenarios'
  type: table
  max_items: 3
- id: q8
  text: 'Step 5: Decide'
  type: table
  max_items: 3
- id: q9
  text: 'Track your decision speed over the past week:'
  type: checkbox
  options:
  - value: decision
    label: Decision
- id: q10
  text: 'Analysis:'
  type: fill_in
- id: q11
  text: Which decisions should you NOT be making?
  type: checkbox
  options:
  - value: decision_type
    label: Decision Type
- id: q12
  text: 'Delegation Rules:'
  type: open_ended
- id: q13
  text: 'Check which traps affect you:'
  type: checkbox
  options:
  - value: trap
    label: Trap
  - value: analysis_paralysis
    label: Analysis Paralysis
  - value: consensus_seeking
    label: Consensus Seeking
  - value: sunk_cost
    label: Sunk Cost
  - value: recency_bias
    label: Recency Bias
  - value: overconfidence
    label: Overconfidence
- id: q14
  text: 'For difficult decisions, ask:'
  type: table
  max_items: 3
- id: q15
  text: Does this change your decision? ☐ Yes ☐ No
  type: open_ended
- id: q16
  text: 'This week, commit to:'
  type: table
  max_items: 3
- id: q17
  text: 'Part 10: Commitment'
  type: fill_in
actions: []
