id: demo_script
name: 30-Second Demo Script Template
program: 100m_blueprint
phase: 2
week: 5
frameworks: []
worksheet_path: ../docs/worksheets/week-05-demo-script.md
prerequisites: []
questions:
- id: q1
  text: 'Step 1: DEMONSTRATE (The Problem) — 10 seconds'
  type: table
  max_items: 3
- id: q2
  text: 'Step 2: EXPLAIN (The Intervention) — 5 seconds'
  type: table
  max_items: 2
- id: q3
  text: 'Step 3: MAGNIFY (The Result) — 10 seconds'
  type: table
  max_items: 3
- id: q4
  text: 'Step 4: OVERCOME (The Objection) — 5 seconds'
  type: table
  max_items: 3
- id: q5
  text: 'Write your full demo script here:'
  type: table
  max_items: 5
- id: q6
  text: 'If you sell a PRODUCT:'
  type: table
  max_items: 4
- id: q7
  text: 'If you sell a SERVICE:'
  type: table
  max_items: 4
- id: q8
  text: 'If you sell COACHING/CONSULTING:'
  type: table
  max_items: 4
- id: q9
  text: What is YOUR "Push Test"?
  type: checkbox
  options:
  - value: criteria
    label: Criteria
  - value: is_it_physical_or_visual
    label: Is it PHYSICAL or VISUAL?
  - value: is_it_immediate_30_sec
    label: Is it IMMEDIATE (<30 sec)?
  - value: is_it_undeniable_hard_to_argue_with
    label: Is it UNDENIABLE (hard to argue with)?
  - value: is_it_repeatable_anyone_can_do_it
    label: Is it REPEATABLE (anyone can do it)?
- id: q10
  text: If you answered "No" to any, how can you improve?
  type: fill_in
- id: q11
  text: 'Test your demo with 5 real prospects:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q12
  text: 'Demo Success Metrics:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q13
  text: 'When recording your demo video:'
  type: checkbox
  options:
  - value: element
    label: Element
  - value: lighting_well-lit,_no_shadows_on_face
    label: 'Lighting: Well-lit, no shadows on face.'
  - value: audio_clear,_no_background_noise
    label: 'Audio: Clear, no background noise.'
  - value: framing_productresult_clearly_visible
    label: 'Framing: Product/result clearly visible.'
  - value: pacing_under_30_seconds_total
    label: 'Pacing: Under 30 seconds total.'
  - value: cta_clear_next_step_at_the_end
    label: 'CTA: Clear next step at the end.'
- id: q14
  text: 'Equipment Needed:'
  type: checkbox
  options:
  - value: item
    label: Item
  - value: smartphone_good_camera
    label: Smartphone (good camera)
  - value: tripod_or_stable_surface
    label: Tripod or stable surface
  - value: ring_light_or_natural_light
    label: Ring light or natural light
  - value: lavalier_mic_optional
    label: Lavalier mic (optional)
- id: q15
  text: Where will you use your demo?
  type: table
  max_items: 5
- id: q16
  text: 'Your polished 30-second demo script:'
  type: fill_in
actions: []
scoring:
  type: scale
  dimensions:
  - reaction score
  levels:
  - name: Low
    range_label: 1-3
  - name: Medium
    range_label: 4-6
  - name: High
    range_label: 7-10
