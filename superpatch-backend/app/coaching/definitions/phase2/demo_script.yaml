id: demo_script
name: SuperPatch Demo & Push Test Script
program: 100m_blueprint
phase: 2
week: 6
frameworks:
  - Push Test
  - 30-Second Demo
worksheet_path: docs/worksheets/week-06a-demo-script.md
prerequisites: []
questions:
  - id: q1
    text: "Have you done the Push Test on yourself? Describe what you felt."
    type: open_ended
  - id: q2
    text: "How many Push Test demos have you done with prospects in the last 2 weeks?"
    type: choice
    options:
      - value: "0"
        label: "0 — haven't done any"
      - value: "1_5"
        label: "1-5"
      - value: "6_15"
        label: "6-15"
      - value: "15_plus"
        label: "15+"
  - id: q3
    text: "Write your Push Test setup — what do you say BEFORE you do the test? (Frame it so they're curious, not skeptical.)"
    type: open_ended
  - id: q4
    text: "Write what you say DURING the test — the exact words as they feel the difference."
    type: open_ended
  - id: q5
    text: "Write your follow-up question AFTER the test — the question that leads to the next step."
    type: open_ended
  - id: q6
    text: "What do you say when the Push Test doesn't produce a dramatic result? (It happens.)"
    type: open_ended
  - id: q7
    text: "Do you have a video of yourself doing the Push Test? If yes, where do you share it?"
    type: choice
    options:
      - value: no_video
        label: "No — haven't recorded one"
      - value: have_but_dont_share
        label: "Yes, but I don't share it often"
      - value: share_regularly
        label: "Yes, and I share it on social media"
  - id: q8
    text: "Rate how naturally the Push Test flows in your conversations right now."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q9
    text: "Write your full 30-second demo flow: Setup (10s) → Test (10s) → Result (5s) → Ask (5s)"
    type: open_ended
  - id: q10
    text: "How many Push Test demos will you do this week? Set a specific number."
    type: choice
    options:
      - value: "3_5"
        label: "3-5"
      - value: "5_10"
        label: "5-10"
      - value: "10_plus"
        label: "10+"
scoring:
  type: scale
  dimensions:
    - demo_frequency
    - natural_delivery
    - conversion
  levels:
    - name: Awkward
      range_label: "1-3"
    - name: Smooth
      range_label: "4-6"
    - name: Automatic
      range_label: "7-10"
case_study:
  title: "The Push Test That Built an Empire"
  content: >
    Jay calls the Push Test "the most powerful 30 seconds in network
    marketing." Here's why: you're not selling. You're not explaining
    science. You're letting their own body do the talking. "Put the patch
    on. Push against my hand. Now take it off. Push again. Feel that?"
    When someone's OWN BODY shows them the difference, you don't need a
    slide deck. You don't need a comp plan. You need a next step. "When
    would you like to try this for a full week?"
actions:
  - Practice the Push Test on 5 people this week
  - Record a video of yourself doing the Push Test
  - Write your full 30-second demo script and memorize it
  - Track your demo-to-sample conversion rate
