id: one_on_one_mastery
name: One-on-One Presentation Mastery
program: 100m_blueprint
phase: 2
week: 6
frameworks:
  - Show-Share-Ask
  - Push Test Demo
worksheet_path: docs/worksheets/week-06b-one-on-one-mastery.md
prerequisites:
  - personal_story_builder
questions:
  - id: q1
    text: "How many one-on-one presentations (in person or Zoom) have you done in the last 30 days?"
    type: choice
    options:
      - value: "0"
        label: "0"
      - value: "1_3"
        label: "1-3"
      - value: "4_10"
        label: "4-10"
      - value: "10_plus"
        label: "10+"
  - id: q2
    text: "Describe your current presentation flow. What do you show/say from start to finish?"
    type: open_ended
  - id: q3
    text: "Using Show-Share-Ask: What do you SHOW them (demo, Push Test)? What do you SHARE (your story, testimonials)? What do you ASK (trial close, next step)?"
    type: open_ended
  - id: q4
    text: "How do you set up a 3-way call or introduction with your upline? Describe your process."
    type: open_ended
  - id: q5
    text: "What tools do you use during presentations? (Videos, product samples, brochures, digital assets)"
    type: open_ended
  - id: q6
    text: "How do you handle the transition from product presentation to business opportunity?"
    type: open_ended
  - id: q7
    text: "Rate your confidence running a presentation without your upline."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q8
    text: "What is the hardest part of your presentation? Where do you lose people?"
    type: open_ended
  - id: q9
    text: "Write your closing question — the specific words you use to ask for the next step after a presentation."
    type: open_ended
  - id: q10
    text: "How many presentations will you schedule this week?"
    type: choice
    options:
      - value: "1_2"
        label: "1-2"
      - value: "3_5"
        label: "3-5"
      - value: "5_plus"
        label: "5+"
scoring:
  type: scale
  dimensions:
    - presentation_flow
    - confidence
    - closing_skill
  levels:
    - name: Novice
      range_label: "1-3"
    - name: Capable
      range_label: "4-6"
    - name: Pro
      range_label: "7-10"
actions:
  - Write out your full Show-Share-Ask presentation flow
  - Schedule at least 3 presentations this week
  - Set up a 3-way call with your upline for your next serious prospect
  - Practice your closing question until it rolls off your tongue
