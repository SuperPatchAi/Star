id: recruiting_conversation
name: The Recruiting Conversation
program: 100m_blueprint
phase: 3
week: 8
frameworks:
  - Curiosity-Story-Vision-Invite
  - Two-Track Approach
worksheet_path: docs/worksheets/week-08a-recruiting-conversation.md
prerequisites:
  - sample_to_close_system
questions:
  - id: q1
    text: "How many people have you invited to look at the business opportunity in the last 30 days?"
    type: choice
    options:
      - value: "0"
        label: "0"
      - value: "1_3"
        label: "1-3"
      - value: "4_10"
        label: "4-10"
      - value: "10_plus"
        label: "10+"
  - id: q2
    text: "Do you currently present the PRODUCT and the BUSINESS OPPORTUNITY as two separate conversations, or do you try to do both at once?"
    type: choice
    options:
      - value: product_only
        label: "I only talk about the product — I never bring up the business"
      - value: both_at_once
        label: "I try to pitch both at the same time"
      - value: two_track
        label: "Product first, then business opportunity as a separate conversation"
  - id: q3
    text: "What signals tell you a customer might be open to the business opportunity? (e.g., they love the product, they ask about income, they're entrepreneurial, they share it without being asked)"
    type: open_ended
  - id: q4
    text: "Write your 'curiosity' opener — the question or statement you use to introduce the business opportunity without being pushy."
    type: open_ended
  - id: q5
    text: "Write your 'story' — a 60-second version of why YOU joined the business (not the product — the BUSINESS)."
    type: open_ended
  - id: q6
    text: "Write your 'vision' statement — what you paint for someone about what's possible for THEM."
    type: open_ended
  - id: q7
    text: "Write your 'invite' — the specific question you ask to get them to the next step (watch a video, join a call, meet your upline)."
    type: open_ended
  - id: q8
    text: "What is your biggest fear about inviting people to the business?"
    type: open_ended
  - id: q9
    text: "Rate your comfort level having the recruiting conversation."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q10
    text: "Who are 5 customers or contacts you will invite to look at the business this week?"
    type: table
    max_items: 5
scoring:
  type: scale
  dimensions:
    - invitation_frequency
    - conversation_quality
    - follow_through
  levels:
    - name: Avoiding
      range_label: "1-3"
    - name: Growing
      range_label: "4-6"
    - name: Natural
      range_label: "7-10"
actions:
  - Write your full Curiosity-Story-Vision-Invite script
  - Practice the conversation with your upline via role-play
  - Invite at least 5 people to look at the business this week
  - Track your invite-to-presentation conversion rate
