id: closing_mastery
name: Closing Mastery
program: 100m_blueprint
phase: 3
week: 9
frameworks:
  - Assumptive Close
  - Choice Close
  - Urgency Close
worksheet_path: docs/worksheets/week-09a-closing-mastery.md
prerequisites:
  - sample_to_close_system
  - objection_mastery
questions:
  - id: q1
    text: "What is your current close rate? Out of the last 10 people who tried a sample, how many purchased?"
    type: choice
    options:
      - value: "0_1"
        label: "0-1 out of 10"
      - value: "2_3"
        label: "2-3 out of 10"
      - value: "4_5"
        label: "4-5 out of 10"
      - value: "6_plus"
        label: "6+ out of 10"
  - id: q2
    text: "What is your biggest challenge when it's time to ask for the sale?"
    type: choice
    options:
      - value: fear_of_rejection
        label: "Fear of rejection"
      - value: dont_know_what_to_say
        label: "I don't know what to say"
      - value: feels_pushy
        label: "It feels pushy or salesy"
      - value: timing
        label: "I can never find the right moment"
      - value: follow_up
        label: "I follow up but never close the loop"
  - id: q3
    text: "Write an ASSUMPTIVE CLOSE for SuperPatch. (Assume they're buying — 'Which product do you want to start with?')"
    type: open_ended
  - id: q4
    text: "Write a CHOICE CLOSE. (Give two options, both lead to a sale — 'Do you want the single pack or the bundle?')"
    type: open_ended
  - id: q5
    text: "Write an URGENCY CLOSE. (Create a reason to act now — limited supply, promo, timing with their goals.)"
    type: open_ended
  - id: q6
    text: "Write a 'WHAT IF' CLOSE for the business opportunity. ('What if you could make an extra $500/month doing what you just saw me do?')"
    type: open_ended
  - id: q7
    text: "How do you handle 'Let me think about it'? Write your exact response."
    type: open_ended
  - id: q8
    text: "After a successful Push Test, what are the EXACT words you use to transition to the sale?"
    type: open_ended
  - id: q9
    text: "Rate your confidence in asking for the sale."
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q10
    text: "What is the MINIMUM number of closes you will attempt this week?"
    type: choice
    options:
      - value: "3"
        label: "3"
      - value: "5"
        label: "5"
      - value: "10"
        label: "10"
      - value: "10_plus"
        label: "10+"
scoring:
  type: scale
  dimensions:
    - close_rate_confidence
    - technique_variety
    - follow_through
  levels:
    - name: Hesitant
      range_label: "1-3"
    - name: Consistent
      range_label: "4-6"
    - name: Closer
      range_label: "7-10"
actions:
  - Write and memorize 4 different closing scripts
  - Practice each close out loud 10 times
  - Attempt at least 5 closes this week and track results
  - Debrief every close (won or lost) with your upline
