id: talent_density_audit
name: Talent Density Audit
program: 100m_blueprint
phase: 3
week: 8
frameworks:
- Talent Density
- A-Player Scorecard
worksheet_path: ../docs/worksheets/week-08-talent-density-audit.md
prerequisites: []
questions:
- id: q1
  text: 'Score each team member on these 5 attributes (1-10):'
  type: table
  max_items: 5
- id: q2
  text: 'Rate each team member:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q3
  text: 'Grading Scale:'
  type: open_ended
- id: q4
  text: 'Current Team Breakdown:'
  type: table
  max_items: 4
- id: q5
  text: 'Target Breakdown:'
  type: table
  max_items: 3
- id: q6
  text: 'For each team member, answer honestly:'
  type: checkbox
  options:
  - value: team_member
    label: Team Member
- id: q7
  text: 'Summary:'
  type: fill_in
- id: q8
  text: 'For A-Players (Keep & Grow):'
  type: table
  max_items: 0
- id: q9
  text: 'For B-Players (Coach or Move):'
  type: checkbox
  options:
  - value: b-player
    label: B-Player
- id: q10
  text: 'For C-Players (Exit):'
  type: table
  max_items: 0
- id: q11
  text: What roles are you missing?
  type: table
  max_items: 0
- id: q12
  text: 'Your #1 Critical Hire:'
  type: table
  max_items: 4
- id: q13
  text: 'For your next hire, define:'
  type: table
  max_items: 11
- id: q14
  text: 'Your 3-Stage Interview Gauntlet:'
  type: table
  max_items: 3
- id: q15
  text: 'Case Study Prompt for Your Next Hire:'
  type: fill_in
- id: q16
  text: 'Your pay philosophy:'
  type: checkbox
  options:
  - value: component
    label: Component
  - value: base_salary
    label: Base Salary
  - value: bonus_structure
    label: Bonus Structure
  - value: equity_if_applicable
    label: Equity (if applicable)
- id: q17
  text: Does your compensation attract A-Players?
  type: checkbox
  options:
  - value: question
    label: Question
  - value: is_there_significant_upside_for_top_performers
    label: Is there significant upside for top performers?
  - value: is_underperformance_penalized_or_tolerated
    label: Is underperformance penalized (or tolerated)?
  - value: would_an_a-player_be_excited_by_this_comp_package
    label: Would an A-Player be excited by this comp package?
- id: q18
  text: '90-Day Talent Density Improvement Plan:'
  type: table
  max_items: 7
actions: []
scoring:
  type: scale
  dimensions:
  - pace
  levels:
  - name: Low
    range_label: 1-3
  - name: Medium
    range_label: 4-6
  - name: High
    range_label: 7-10
