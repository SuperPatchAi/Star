id: a_player_scorecard
name: A-Player Criteria Scorecard
program: 100m_blueprint
phase: 3
week: 8
frameworks:
- Talent Density
worksheet_path: ../docs/worksheets/week-08b-a-player-scorecard.md
prerequisites: []
questions:
- id: q1
  text: Why does this role exist?
  type: fill_in
- id: q2
  text: What would happen if this role didn't exist?
  type: fill_in
- id: q3
  text: 'Define 3-5 measurable outcomes expected in the first year:'
  type: table
  max_items: 5
- id: q4
  text: How will we measure success?
  type: table
  max_items: 3
- id: q5
  text: 'Rate importance (1-10) and define what excellence looks like:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q6
  text: 'Use this to score candidates:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q7
  text: 'Scoring Guide:'
  type: open_ended
- id: q8
  text: Track Record
  type: table
  max_items: 3
- id: q9
  text: Velocity
  type: table
  max_items: 3
- id: q10
  text: Ownership
  type: table
  max_items: 3
- id: q11
  text: Culture Add
  type: table
  max_items: 3
- id: q12
  text: Coachability
  type: table
  max_items: 3
- id: q13
  text: 'Questions to ask references:'
  type: table
  max_items: 6
- id: q14
  text: 'Red flags to watch for:'
  type: open_ended
- id: q15
  text: 'Before making an offer, confirm:'
  type: checkbox
  options:
  - value: score_is_80+_on_scorecard
    label: Score is 80+ on scorecard
  - value: at_least_3_competencies_scored_8+
    label: At least 3 competencies scored 8+
  - value: no_competency_scored_below_5
    label: No competency scored below 5
  - value: references_were_enthusiastic
    label: References were enthusiastic
  - value: they_would_raise_our_team_average
    label: They would raise our team average
  - value: cultural_alignment_is_strong
    label: Cultural alignment is strong
  - value: compensation_expectations_align
    label: Compensation expectations align
- id: q16
  text: 'Final Decision:'
  type: checkbox
  options:
  - value: decision
    label: Decision
  - value: strong_hire
    label: Strong Hire
  - value: hire_with_development_plan
    label: Hire with Development Plan
  - value: pass
    label: Pass
- id: q17
  text: '30-60-90 Day Expectations:'
  type: table
  max_items: 3
- id: q18
  text: 'First Quick Win:'
  type: table
  max_items: 3
- id: q19
  text: 'Quarterly Check-In:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q20
  text: 'Keep/Develop/Exit Decision:'
  type: table
  max_items: 3
- id: q21
  text: 'Part 10: Scorecard Summary'
  type: fill_in
actions: []
