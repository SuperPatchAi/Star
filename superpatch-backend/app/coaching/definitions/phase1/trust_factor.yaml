id: trust_factor_assessment
name: Trust Factor Self-Assessment
program: 100m_blueprint
phase: 1
week: 2
frameworks:
  - 3 Trust Factors
  - Amygdala Filter
worksheet_path: docs/worksheets/week-02a-trust-factor-assessment.md
prerequisites:
  - financial_ladder_assessment
questions:
  - id: q1
    text: "Trust in YOU — Track Record: Do you have verifiable results?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q2
    text: "Trust in YOU — Social Proof: Do others vouch for you publicly?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q3
    text: "Trust in YOU — Personal Brand: Are you known in your space?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q4
    text: "Trust in YOU — Authenticity: Do you show up as your real self?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q5
    text: "Trust in YOU — Communication: Can you explain your value clearly?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q6
    text: "Trust in VEHICLE — Proof of Concept: Does your product demonstrably work?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q7
    text: "Trust in VEHICLE — Testimonials: Do customers share results publicly?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q8
    text: "Trust in VEHICLE — Credibility Markers: Awards, press, partnerships?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q9
    text: "Trust in VEHICLE — Demonstrability: Can you show it works in <30 seconds?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q10
    text: "Trust in VEHICLE — Industry Reputation: Is your industry trusted?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q11
    text: "Trust in SELF — Simplicity: Is your offer easy for them to execute?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q12
    text: "Trust in SELF — Support: Do you provide help when they struggle?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q13
    text: "Trust in SELF — Quick Wins: Can they see early results fast?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q14
    text: "Trust in SELF — Community: Do they have peers to learn from?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q15
    text: "Trust in SELF — Risk Reversal: Do you reduce their fear of failure?"
    type: scale
    scale_min: 1
    scale_max: 10
  - id: q16
    text: "Which factor is your BIGGEST gap?"
    type: choice
    options:
      - value: trust_in_me
        label: Trust in Me
      - value: trust_in_vehicle
        label: Trust in Vehicle
      - value: trust_in_self
        label: Trust in Self
  - id: q17
    text: "Why do you think this gap exists?"
    type: open_ended
  - id: q18
    text: "Trust-Building Assets Inventory"
    type: checkbox
    options:
      - value: video_testimonials
        label: Video testimonials
      - value: written_case_studies
        label: Written case studies
      - value: before_after_proof
        label: Before/after proof
      - value: press_media_coverage
        label: Press/media coverage
      - value: awards_certifications
        label: Awards/certifications
      - value: personal_story_journey
        label: Personal story/journey
      - value: 30_second_demo
        label: 30-second demo
      - value: guarantee_risk_reversal
        label: Guarantee/risk reversal
      - value: onboarding_system
        label: Onboarding system
      - value: community_peer_support
        label: Community/peer support
  - id: q19
    text: "Imagine you are a skeptical prospect — why should they trust you?"
    type: open_ended
  - id: q20
    text: "30-Day Trust-Building Plan — weekly actions for your #1 Trust Gap"
    type: table
    max_items: 4
  - id: q21
    text: "Commitment: My #1 Trust Gap and what I will do to close it"
    type: fill_in
scoring:
  type: scale
  dimensions:
    - Trust in YOU
    - Trust in VEHICLE
    - Trust in SELF
  levels:
    - name: Low
      range_label: "1-3"
    - name: Medium
      range_label: "4-6"
    - name: High
      range_label: "7-10"
case_study:
  title: 'The Super Patch "Balance Test"'
  content: >
    Problem: VTT technology is invisible. How do you build trust in something you can't see?
    Solution: The "Push Test" — a 30-second, undeniable physical demonstration.
    Result: Instant credibility. The prospect's own body becomes the proof.
    Key Insight: "If you can make the customer sell themselves, you don't need to sell."
actions:
  - Score yourself 1-10 on each Trust Factor
  - Identify your number one trust gap
  - Create a 30-day action plan to address your biggest gap
  - Record a 60-second "vehicle explainer" video
  - Gather feedback on your video from 3+ people
