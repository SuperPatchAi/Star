id: warm_market_100
name: Warm Market 100 List Builder
program: 100m_blueprint
phase: 1
week: 3
frameworks:
  - Memory Jogger
  - FORM Method
worksheet_path: docs/worksheets/week-03b-warm-market-100.md
prerequisites: []
questions:
  - id: q1
    text: "How many people are currently on your contact list (phone, social media, etc.)?"
    type: choice
    options:
      - value: under_100
        label: "Under 100"
      - value: 100_300
        label: "100-300"
      - value: 300_500
        label: "300-500"
      - value: 500_plus
        label: "500+"
  - id: q2
    text: "List your INNER CIRCLE (family, close friends, people who already trust you) — aim for 20+ names."
    type: open_ended
  - id: q3
    text: "List your WARM MARKET (coworkers, neighbors, gym buddies, parents from kids' activities, church, etc.) — aim for 30+ names."
    type: open_ended
  - id: q4
    text: "List your LUKEWARM MARKET (social media connections, old classmates, people you haven't talked to in a while) — aim for 30+ names."
    type: open_ended
  - id: q5
    text: "List your COLD MARKET sources (where you meet new people regularly — gym, coffee shop, networking events, online groups)."
    type: open_ended
  - id: q6
    text: "Of everyone on your list, who are the TOP 10 people most likely to TRY a sample?"
    type: table
    max_items: 10
  - id: q7
    text: "Of everyone on your list, who are the TOP 5 people most likely to JOIN the business?"
    type: table
    max_items: 5
  - id: q8
    text: "What is your plan for reaching out to your Top 10 this week? Be specific — call, text, DM, coffee?"
    type: open_ended
  - id: q9
    text: "How many NEW people will you add to your list each week? (Your list should always be growing.)"
    type: choice
    options:
      - value: "2_5"
        label: "2-5 per week"
      - value: "5_10"
        label: "5-10 per week"
      - value: "10_plus"
        label: "10+ per week"
  - id: q10
    text: "What is your biggest fear about reaching out to people on your list?"
    type: open_ended
scoring:
  type: scale
  dimensions:
    - list_size
    - list_diversity
    - outreach_plan
  levels:
    - name: Starter
      range_label: "1-3"
    - name: Builder
      range_label: "4-6"
    - name: Networker
      range_label: "7-10"
actions:
  - Complete your list of 100+ names across all 4 categories
  - Identify your Top 10 sample prospects and Top 5 business prospects
  - Reach out to at least 5 people from your list this week
  - Add 5 new names to your list every week from now on
