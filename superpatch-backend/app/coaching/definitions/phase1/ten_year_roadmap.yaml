id: ten_year_roadmap
name: 10-Year Product Roadmap Template
program: 100m_blueprint
phase: 1
week: 3
frameworks:
- 10-Year Product Roadmap
worksheet_path: ../docs/worksheets/week-03-ten-year-roadmap.md
prerequisites: []
questions:
- id: q1
  text: Are you building a PRODUCT or a PLATFORM?
  type: table
  max_items: 5
- id: q2
  text: 'My business is currently a: ☐ Product  ☐ Platform  ☐ Hybrid'
  type: open_ended
- id: q3
  text: What would it take to become a Platform?
  type: fill_in
- id: q4
  text: What have you invested in that competitors would need YEARS to replicate?
  type: table
  max_items: 6
- id: q5
  text: 'Your "Moat Statement":'
  type: fill_in
- id: q6
  text: What is your CORE product/service today?
  type: table
  max_items: 5
- id: q7
  text: What must you DEFEND in Horizon 1?
  type: table
  max_items: 3
- id: q8
  text: What must you GROW in Horizon 1?
  type: table
  max_items: 3
- id: q9
  text: What are 3-5 ways to EXTEND your platform?
  type: table
  max_items: 5
- id: q10
  text: 'Expansion Criteria Checklist:'
  type: checkbox
  options:
  - value: criteria
    label: Criteria
  - value: leverages_existing_rd
    label: Leverages existing R&D?
  - value: serves_existing_customers
    label: Serves existing customers?
  - value: uses_existing_distribution
    label: Uses existing distribution?
  - value: margin-accretive
    label: Margin-accretive?
  - value: defensible
    label: Defensible?
- id: q11
  text: 'Priority Ranking (H2):'
  type: table
  max_items: 3
- id: q12
  text: What are "blue sky" opportunities for your platform?
  type: table
  max_items: 3
- id: q13
  text: 'H3 Exploration Questions:'
  type: table
  max_items: 3
- id: q14
  text: Revenue by Horizon
  type: table
  max_items: 10
- id: q15
  text: Revenue Mix Evolution
  type: table
  max_items: 3
- id: q16
  text: What are the CRITICAL milestones for each horizon?
  type: table
  max_items: 6
- id: q17
  text: If you were to sell your business in 10 years, what would make it valuable?
  type: table
  max_items: 6
- id: q18
  text: 'Estimated Valuation (Revenue Multiple):'
  type: table
  max_items: 3
- id: q19
  text: 'Complete your 10-Year Vision:'
  type: fill_in
actions: []
