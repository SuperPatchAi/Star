id: platform_checklist
name: Platform vs. Product Checklist
program: 100m_blueprint
phase: 1
week: 3
frameworks:
- Platform vs. Product
worksheet_path: ../docs/worksheets/week-03b-platform-checklist.md
prerequisites: []
questions:
- id: q1
  text: Score your business (1 = Product, 5 = Platform)
  type: checkbox
  options:
  - value: criteria
    label: Criteria
  - value: multiple_products_do_you_have_3+_offerings
    label: 'Multiple Products: Do you have 3+ offerings?'
  - value: shared_infrastructure_do_offerings_share_rdtech
    label: 'Shared Infrastructure: Do offerings share R&D/tech?'
  - value: cross-sell_do_customers_buy_multiple_products
    label: 'Cross-Sell: Do customers buy multiple products?'
  - value: network_effects_does_value_increase_with_users
    label: 'Network Effects: Does value increase with users?'
  - value: data_moat_do_you_accumulate_proprietary_data
    label: 'Data Moat: Do you accumulate proprietary data?'
  - value: ecosystem_are_there_partnersdevelopers_building_on_you
    label: 'Ecosystem: Are there partners/developers building on you?'
  - value: recurring_revenue_is_revenue_subscription-based
    label: 'Recurring Revenue: Is revenue subscription-based?'
  - value: scalability_can_you_10x_revenue_without_10x_cost
    label: 'Scalability: Can you 10x revenue without 10x cost?'
  - value: total_score
    label: TOTAL SCORE
- id: q2
  text: 'Scoring Guide:'
  type: fill_in
- id: q3
  text: What could your platform look like?
  type: table
  max_items: 6
- id: q4
  text: 'Check which you have:'
  type: scale
  scale_min: 1
  scale_max: 10
- id: q5
  text: 'Stage 1: Product (Current)'
  type: fill_in
- id: q6
  text: 'Stage 2: Product + Extensions'
  type: checkbox
  options:
  - value: extension
    label: Extension
  - value: '1'
    label: '1.'
  - value: '2'
    label: '2.'
  - value: '3'
    label: '3.'
- id: q7
  text: 'Stage 3: Platform Foundation'
  type: fill_in
- id: q8
  text: 'Stage 4: Ecosystem'
  type: fill_in
- id: q9
  text: If you have a platform, how defensible is it?
  type: scale
  scale_min: 1
  scale_max: 10
- id: q10
  text: What's the ONE thing you could do to become more "platform-like"?
  type: checkbox
  options:
  - value: action
    label: Action
  - value: '1'
    label: '1.'
  - value: '2'
    label: '2.'
  - value: '3'
    label: '3.'
- id: q11
  text: High Impact, Low Effort = Do First
  type: fill_in
- id: q12
  text: 'Part 8: Platform Vision Statement'
  type: fill_in
actions: []
